<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panashe Sanyanga | Contact Me</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Contact Panashe Sanyanga."
    />
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <div class="floating-orbs"></div>

    <header>
      <div class="container header-bar">
        <div class="logo">PS <br />PROJECTS</div>
        <nav class="nav">
          <a href="index.html">HOME</a>
          <a href="projects.html">PROJECTS</a>
          <a href="about.html">ABOUT</a>
          <a href="contact.html" class="active">CONTACT</a>
          <a href="cv.html" target="_blank" rel="noopener noreferrer">CV</a>
        </nav>
      </div>
    </header>

    <main class="container contact-page" id="contact">
      <div class="contact-intro">
        <h1>Contact Me</h1>
      </div>

      <div class="contact-info">
        <p>
          Email:
          <a href="mailto:panashe.sanyanga@hotmail.com"
            >panashe.sanyanga@hotmail.com</a
          >
        </p>
        <p>
          LinkedIn:
          <a href="https://www.linkedin.com/in/panashe-l-s" target="_blank"
            >linkedin.com/in/panashe-l-s</a
          >
        </p>
        <p>
          GitHub:
          <a href="https://github.com/code-by-panashe-sanyanga" target="_blank"
            >github.com/code-by-panashe-sanyanga</a
          >
        </p>
      </div>

      <div class="contact-form-section">
        <form class="contact-form">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />

          <label for="subject">Subject:</label>
          <input type="text" id="subject" name="subject" />

          <label for="message">Message:</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </div>
    </main>

    <footer>&copy; 2026 Made by <strong>Panashe Sanyanga</strong></footer>
    <script src="script.js"></script>
  </body>
</html>
